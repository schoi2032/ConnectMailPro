<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectMailPro Live</title>
    <!-- Updated Favicon to Mail Logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='20' height='16' x='2' y='4' rx='2'/%3E%3Cpath d='m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .email-item { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .email-item.active { background-color: white !important; border-left: 4px solid #2563eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .avatar-option { cursor: pointer; transition: all 0.2s; border: 3px solid transparent; border-radius: 1rem; overflow: hidden; }
        .avatar-option:hover { transform: scale(1.05); }
        .avatar-option.selected { border-color: #2563eb; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen">

    <!-- Registration/Profile Overlay -->
    <div id="registration-overlay" class="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-2xl w-full shadow-2xl animate-slide-up overflow-y-auto max-h-[90vh] custom-scrollbar text-center">
            <div class="flex flex-col items-center mb-6">
                <div class="bg-blue-600 p-4 rounded-2xl text-white mb-4 shadow-lg shadow-blue-200">
                    <i data-lucide="mail" class="w-8 h-8"></i>
                </div>
                <h1 id="reg-title" class="text-2xl font-bold text-slate-900">Live Mail Setup</h1>
                <p class="text-slate-500 mt-1 text-sm">Choose a handle and avatar to start messaging others live.</p>
            </div>
            
            <div class="space-y-6 text-left">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Your Name</label>
                        <input type="text" id="reg-name" placeholder="Alex Smith" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Live Handle</label>
                        <div class="relative">
                            <input type="text" id="reg-email" placeholder="alex" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all pr-32">
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-xs">@connect.pro</span>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-3">Choose Your Avatar</label>
                    <div class="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar">
                        <button onclick="changeAvatarCategory('avataaars')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-bold bg-blue-600 text-white whitespace-nowrap">People</button>
                        <button onclick="changeAvatarCategory('adventurer')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 whitespace-nowrap">Adventurers</button>
                        <button onclick="changeAvatarCategory('personas')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 whitespace-nowrap">Personas</button>
                        <button onclick="changeAvatarCategory('big-ears')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 whitespace-nowrap">Fun Ears</button>
                        <button onclick="changeAvatarCategory('bottts')" class="cat-btn px-4 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600 whitespace-nowrap">Robots</button>
                    </div>
                    <div id="avatar-grid" class="grid grid-cols-4 sm:grid-cols-6 gap-3"></div>
                </div>

                <div class="flex gap-3">
                    <button onclick="saveUserProfile()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-200">
                        Enter Live Mail
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-full w-full">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-slate-900 text-slate-300 transition-all duration-300 flex flex-col border-r border-slate-800 shrink-0">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="mail" class="w-6 h-6"></i>
                </div>
                <span class="sidebar-text font-bold text-xl text-white tracking-tight">ConnectMail</span>
            </div>

            <div class="px-4 mb-6">
                <button onclick="toggleCompose(true)" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-50 text-white rounded-2xl w-full py-3 px-4 shadow-lg">
                    <i data-lucide="plus"></i><span class="sidebar-text font-medium">Compose</span>
                </button>
            </div>

            <nav class="flex-1 px-3 space-y-1">
                <button onclick="switchFolder('inbox')" id="btn-inbox" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl bg-blue-600/10 text-blue-400">
                    <i data-lucide="inbox" class="w-5 h-5"></i><span class="sidebar-text font-medium text-sm">Inbox</span>
                </button>
                <button onclick="switchFolder('sent')" id="btn-sent" class="nav-btn w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400">
                    <i data-lucide="send" class="w-5 h-5"></i><span class="sidebar-text font-medium text-sm">Sent</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-800 bg-slate-900/50">
                <div class="flex items-center gap-3">
                    <img id="display-avatar" src="" class="w-10 h-10 rounded-xl bg-slate-700 border border-slate-700 object-cover">
                    <div class="sidebar-text flex flex-col min-w-0 flex-1">
                        <span id="display-name" class="text-xs font-semibold text-white truncate">User Name</span>
                        <span id="display-email" class="text-[10px] text-slate-500 truncate">handle@connect.pro</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 bg-white">
            <header class="h-16 border-b border-slate-100 flex items-center justify-between px-6 bg-white z-10 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 id="folder-title" class="font-bold text-lg text-slate-800 capitalize">Inbox</h2>
                    <div class="flex items-center gap-2 px-2 py-1 bg-green-50 text-green-600 rounded text-[10px] font-bold">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE
                    </div>
                </div>
                <button onclick="resetApp()" class="text-xs text-slate-400 hover:text-red-500">Reset Profile</button>
            </header>

            <div class="flex-1 flex overflow-hidden">
                <section id="list-panel" class="w-full lg:w-[380px] border-r border-slate-100 flex flex-col bg-slate-50/50 shrink-0 overflow-y-auto custom-scrollbar">
                    <div id="email-list"></div>
                </section>
                <section id="reader-panel" class="flex-1 flex flex-col overflow-y-auto bg-white custom-scrollbar">
                    <div id="empty-view" class="flex-1 flex flex-col items-center justify-center text-slate-300 p-12">
                        <i data-lucide="mail-open" class="w-16 h-16 mb-4 opacity-20"></i>
                        <p>Select a message to view content</p>
                    </div>
                    <div id="active-view" class="hidden animate-slide-up p-8 lg:p-12 max-w-3xl mx-auto w-full">
                        <h1 id="view-subject" class="text-3xl font-bold text-slate-900 mb-6">Subject</h1>
                        <div class="flex items-center gap-4 mb-8 pb-8 border-b border-slate-50">
                            <img id="view-avatar-img" class="w-14 h-14 rounded-2xl bg-blue-100 shadow-sm object-cover">
                            <div class="min-w-0">
                                <p id="view-from" class="font-bold text-slate-900 text-lg"></p>
                                <p id="view-date" class="text-xs text-slate-400"></p>
                            </div>
                        </div>
                        <div id="view-body" class="text-slate-700 leading-relaxed whitespace-pre-wrap text-lg"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Compose Modal -->
    <div id="compose-modal" class="hidden fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-slide-up">
            <div class="bg-slate-900 text-white p-5 flex justify-between items-center">
                <span class="font-bold">New Live Message</span>
                <button onclick="toggleCompose(false)"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="relative">
                    <input id="to-email" type="text" placeholder="Recipient handle (e.g. sam)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none pr-32">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">@connect.pro</span>
                </div>
                <input id="to-subject" type="text" placeholder="Subject" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea id="to-body" placeholder="Write your message..." class="w-full h-48 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
            </div>
            <div class="p-4 bg-slate-50 flex justify-end gap-3">
                <button onclick="sendMail()" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg">Send Message</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'connect-live-mail';

        const avatarSeeds = {
            'avataaars': ['Felix', 'Aneka', 'Caleb', 'Elsa', 'Jasper', 'Milo', 'Luna', 'Oliver', 'Toby', 'Zoe'],
            'adventurer': ['James', 'Mary', 'Robert', 'Patricia', 'John', 'Jennifer', 'Michael', 'Linda'],
            'personas': ['Aria', 'Leo', 'Maya', 'Nico', 'Sasha', 'Kai', 'Zara', 'Elias'],
            'big-ears': ['Bunny', 'Dumbo', 'Fennec', 'Radar', 'Echo', 'Spock'],
            'bottts': ['Sparky', 'Bolt', 'Beep', 'Bop', 'Circuit', 'Droid', 'Chip', 'Byte']
        };
        
        let activeCategory = 'avataaars';
        let selectedAvatarUrl = '';
        let userProfile = JSON.parse(localStorage.getItem('connect_live_user')) || null;
        let activeFolder = 'inbox';
        let allMails = [];

        async function init() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (user) => {
                if (user && userProfile) {
                    setupApp();
                } else if (!userProfile) {
                    showRegistration();
                }
            });
            lucide.createIcons();
        }

        window.showRegistration = () => {
            document.getElementById('registration-overlay').classList.remove('hidden');
            selectedAvatarUrl = `https://api.dicebear.com/7.x/${activeCategory}/svg?seed=${avatarSeeds[activeCategory][0]}`;
            renderAvatarGrid();
        };

        window.changeAvatarCategory = (cat) => {
            activeCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('bg-blue-600', btn.textContent.toLowerCase().includes(cat.split('-')[0]));
                btn.classList.toggle('text-white', btn.textContent.toLowerCase().includes(cat.split('-')[0]));
            });
            renderAvatarGrid();
        };

        function renderAvatarGrid() {
            const grid = document.getElementById('avatar-grid');
            grid.innerHTML = avatarSeeds[activeCategory].map(seed => {
                const url = `https://api.dicebear.com/7.x/${activeCategory}/svg?seed=${seed}`;
                return `<div class="avatar-option p-1 ${url === selectedAvatarUrl ? 'selected' : ''}" onclick="selectAvatar('${url}')"><img src="${url}"></div>`;
            }).join('');
        }

        window.selectAvatar = (url) => { selectedAvatarUrl = url; renderAvatarGrid(); };

        window.saveUserProfile = () => {
            const name = document.getElementById('reg-name').value.trim();
            const handle = document.getElementById('reg-email').value.trim().toLowerCase();
            if (!name || !handle) return;
            userProfile = { name, email: handle + "@connect.pro", avatar: selectedAvatarUrl };
            localStorage.setItem('connect_live_user', JSON.stringify(userProfile));
            location.reload();
        };

        function setupApp() {
            document.getElementById('registration-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-name').textContent = userProfile.name;
            document.getElementById('display-email').textContent = userProfile.email;
            document.getElementById('display-avatar').src = userProfile.avatar;

            const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            onSnapshot(msgRef, (snapshot) => {
                allMails = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
            }, (e) => console.error(e));
        }

        window.sendMail = async () => {
            const to = document.getElementById('to-email').value.trim().toLowerCase();
            const sub = document.getElementById('to-subject').value.trim();
            const body = document.getElementById('to-body').value.trim();
            const btn = document.getElementById('send-btn');
            if (!to || !sub || !body) return;

            const targetEmail = to.includes('@') ? to : to + "@connect.pro";
            btn.disabled = true; btn.textContent = "Sending...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    sender: userProfile.name, senderEmail: userProfile.email, senderAvatar: userProfile.avatar,
                    recipient: targetEmail, subject: sub, body, sentAt: Timestamp.now()
                });
                toggleCompose(false);
                document.getElementById('to-email').value = ''; document.getElementById('to-subject').value = ''; document.getElementById('to-body').value = '';
            } catch (e) { console.error(e); } finally { btn.disabled = false; btn.textContent = "Send Message"; }
        };

        window.renderList = () => {
            const container = document.getElementById('email-list'); container.innerHTML = '';
            const filtered = allMails.filter(m => activeFolder === 'inbox' ? m.recipient === userProfile.email : m.senderEmail === userProfile.email)
                .sort((a,b) => (b.sentAt?.seconds || 0) - (a.sentAt?.seconds || 0));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-400">No messages in ${activeFolder}</div>`;
                return;
            }

            filtered.forEach(m => {
                const item = document.createElement('div');
                item.className = "p-4 border-b border-slate-100 cursor-pointer hover:bg-white email-item";
                item.onclick = () => openMail(m);
                item.innerHTML = `
                    <div class="flex gap-3">
                        <img src="${m.senderAvatar}" class="w-10 h-10 rounded-xl bg-slate-100 object-cover">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between mb-0.5">
                                <span class="text-sm font-bold truncate text-slate-700">${activeFolder === 'inbox' ? m.sender : m.recipient}</span>
                                <span class="text-[10px] text-slate-400">${m.sentAt?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || ''}</span>
                            </div>
                            <h4 class="text-xs font-semibold truncate text-slate-900">${m.subject}</h4>
                            <p class="text-[11px] text-slate-500 truncate mt-0.5">${m.body}</p>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        };

        window.openMail = (mail) => {
            document.getElementById('empty-view').classList.add('hidden');
            const view = document.getElementById('active-view'); view.classList.remove('hidden');
            document.getElementById('view-subject').textContent = mail.subject;
            document.getElementById('view-from').textContent = `${mail.sender} <${mail.senderEmail}>`;
            document.getElementById('view-date').textContent = mail.sentAt?.toDate().toLocaleString() || 'Just now';
            document.getElementById('view-body').textContent = mail.body;
            document.getElementById('view-avatar-img').src = mail.senderAvatar;
        };

        window.switchFolder = (f) => {
            activeFolder = f; document.getElementById('folder-title').textContent = f;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-600/10', 'text-blue-400'));
            document.getElementById(`btn-${f}`).classList.add('bg-blue-600/10', 'text-blue-400');
            renderList();
        };

        window.toggleCompose = (s) => document.getElementById('compose-modal').classList.toggle('hidden', !s);
        window.resetApp = () => { localStorage.clear(); location.reload(); };

        init();
    </script>
</body>
</html>
